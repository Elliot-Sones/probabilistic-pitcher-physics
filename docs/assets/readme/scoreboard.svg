<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="610" viewBox="0 0 1100 610" role="img" aria-label="Pitcher Twin honest scoreboard">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#161512"/>
      <stop offset="58%" stop-color="#24221d"/>
      <stop offset="100%" stop-color="#f7f4ec"/>
    </linearGradient>
    <style>
      .eyebrow { font: 700 18px ui-sans-serif, system-ui, sans-serif; fill: #d7a531; letter-spacing: 2px; }
      .title { font: 800 50px ui-sans-serif, system-ui, sans-serif; fill: #f7f4ec; }
      .subtitle { font: 500 22px ui-sans-serif, system-ui, sans-serif; fill: #d8d1c1; }
      .row-title { font: 800 26px ui-sans-serif, system-ui, sans-serif; fill: #191815; }
      .row-note { font: 500 17px ui-sans-serif, system-ui, sans-serif; fill: #625b50; }
      .pill { font: 800 17px ui-sans-serif, system-ui, sans-serif; text-transform: uppercase; }
      .metric { font: 850 34px ui-sans-serif, system-ui, sans-serif; fill: #191815; }
    </style>
  </defs>
  <rect width="1100" height="610" fill="url(#bg)"/>
  <path d="M-120 500 C 120 315, 270 525, 470 365 S 760 155, 1180 345" fill="none" stroke="#1f7a4d" stroke-width="3" opacity="0.48"/>
  <path d="M-80 540 C 170 380, 330 530, 540 380 S 800 260, 1160 430" fill="none" stroke="#d7a531" stroke-width="3" opacity="0.42"/>
  <path d="M-40 575 C 210 425, 410 555, 630 410 S 840 340, 1120 525" fill="none" stroke="#a43d32" stroke-width="3" opacity="0.38"/>
  <text x="48" y="72" class="eyebrow">PRIMARY VALIDATION STORY</text>
  <text x="48" y="128" class="title">Honest Scoreboard</text>
  <text x="48" y="162" class="subtitle">Single split shows the ceiling. Rolling windows decide reliability.</text>
  
  <g transform="translate(48 178)">
    <rect x="0" y="0" width="1004" height="88" rx="14" fill="#ffffff" opacity="0.92"/>
    <rect x="0" y="0" width="7" height="88" rx="3" fill="#1f7a4d"/>
    <text x="34" y="35" class="row-title">Single 70/30 split</text>
    <text x="34" y="64" class="row-note">Skubal FF ceiling result</text>
    <rect x="590" y="18" width="360" height="52" rx="18" fill="#1f7a4d" opacity="0.13"/>
    <text x="616" y="40" class="metric" fill="#1f7a4d">0.533 AUC</text>
    <text x="616" y="63" class="pill" fill="#1f7a4d">validated</text>
  </g>
  <g transform="translate(48 296)">
    <rect x="0" y="0" width="1004" height="88" rx="14" fill="#ffffff" opacity="0.92"/>
    <rect x="0" y="0" width="7" height="88" rx="3" fill="#b47f1a"/>
    <text x="34" y="35" class="row-title">Rolling truth test</text>
    <text x="34" y="64" class="row-note">goal &lt;= 0.620, hit rate &gt;= 0.40</text>
    <rect x="590" y="18" width="360" height="52" rx="18" fill="#b47f1a" opacity="0.13"/>
    <text x="616" y="40" class="metric" fill="#b47f1a">0.702 mean AUC</text>
    <text x="616" y="63" class="pill" fill="#b47f1a">diagnostic</text>
  </g>
  <g transform="translate(48 414)">
    <rect x="0" y="0" width="1004" height="88" rx="14" fill="#ffffff" opacity="0.92"/>
    <rect x="0" y="0" width="7" height="88" rx="3" fill="#a43d32"/>
    <text x="34" y="35" class="row-title">Worst rolling fold</text>
    <text x="34" y="64" class="row-note">release/spin state drift remains visible</text>
    <rect x="590" y="18" width="360" height="52" rx="18" fill="#a43d32" opacity="0.13"/>
    <text x="616" y="40" class="metric" fill="#a43d32">0.929 AUC</text>
    <text x="616" y="63" class="pill" fill="#a43d32">miss</text>
  </g>
</svg>
